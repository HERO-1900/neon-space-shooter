<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Space Shooter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        #game-container {
            position: relative;
        }
        canvas {
            border: 2px solid #00ff88;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #00ff88;
            font-size: 16px;
            text-shadow: 0 0 10px #00ff88;
        }
        #ui div {
            margin-bottom: 5px;
        }
        #mute-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 255, 136, 0.2);
            border: 2px solid #00ff88;
            color: #00ff88;
            padding: 8px 15px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            transition: all 0.3s;
        }
        #mute-btn:hover {
            background: rgba(0, 255, 136, 0.4);
        }
        #mute-btn.muted {
            border-color: #ff3366;
            color: #ff3366;
            background: rgba(255, 51, 102, 0.2);
        }
        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #ff3366;
            display: none;
        }
        #game-over h2 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #ff3366;
        }
        #game-over button {
            padding: 15px 30px;
            font-size: 18px;
            background: #00ff88;
            border: none;
            color: #0a0a0a;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }
        #game-over button:hover {
            background: #00cc6a;
        }
        #start-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #00ff88;
        }
        #start-screen h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #00ff88;
        }
        #start-screen p {
            margin-bottom: 30px;
            font-size: 16px;
        }
        #start-screen button {
            padding: 15px 30px;
            font-size: 18px;
            background: #00ff88;
            border: none;
            color: #0a0a0a;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game" width="800" height="600"></canvas>
        <div id="ui">
            <div>SCORE: <span id="score">0</span></div>
            <div>LIVES: <span id="lives">3</span></div>
            <div>LEVEL: <span id="level">1</span></div>
        </div>
        <button id="mute-btn" onclick="toggleAudio()">🔊 AUDIO ON</button>
        <div id="start-screen">
            <h1>NEON SPACE</h1>
            <p>Use ARROW KEYS to move • SPACE to shoot</p>
            <button onclick="startGame()">START GAME</button>
        </div>
        <div id="game-over">
            <h2>GAME OVER</h2>
            <p>Final Score: <span id="final-score">0</span></p>
            <button onclick="restartGame()">PLAY AGAIN</button>
        </div>
    </div>
    <script src="audio.js"></script>
    <script src="game.js"></script>
</body>
</html>
